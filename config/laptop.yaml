# Drone Platform Configuration — AMD/Intel x86_64 Laptop
# For development and SITL simulation on standard Linux laptops.
#
# Usage:
#   cp config/laptop.yaml ~/.drone/config.yaml
#
# Your system: Linux x86_64 (Ubuntu 22.04+)
# Tested on: AMD Ryzen laptops, Intel laptops

drone:
  identity_dir: "~/.drone/identity"
  org_id: "zypher-prototype"

flight:
  # SITL simulation (default for laptop development)
  connection: "udp:127.0.0.1:14550"
  # USB flight controller (uncomment for real hardware)
  # connection: "/dev/ttyACM0"
  # connection: "/dev/ttyUSB0"
  baud_rate: 57600
  max_altitude_m: 50.0
  max_speed_ms: 10.0
  rtl_battery_pct: 25
  heartbeat_timeout_s: 5

vision:
  # Laptop camera options:
  #   0            — Built-in webcam (V4L2, most common)
  #   1            — External USB webcam
  #   "/dev/video0" — Explicit V4L2 device
  #   "/path/to/video.mp4" — Video file for testing
  camera_source: 0
  frame_width: 1280
  frame_height: 720
  fps: 30
  # Detection model
  # yolov8n = fastest (good for CPU inference on laptop)
  # yolov8s = more accurate (needs GPU or powerful CPU)
  model: "yolov8n"
  confidence_threshold: 0.5
  target_classes:
    - "person"
    - "car"
    - "truck"
    - "bicycle"
  save_detections: true
  detections_dir: "~/.drone/detections"

security:
  private_key_file: "drone_key.pem"
  public_key_file: "drone_key_pub.pem"
  audit_log_db: "~/.drone/audit.db"
  command_max_age_s: 30

comms:
  mqtt:
    broker: "localhost"
    port: 1883
    topic_prefix: "drone"
    use_tls: false
    qos: 1

data:
  db_path: "~/.drone/missions.db"
  max_storage_mb: 4096

surveillance:
  loop_patrol: true
  waypoint_hover_s: 5
  detection_loiter_s: 10
  alert_cooldown_s: 30
  default_altitude_m: 30.0
  default_speed_ms: 5.0
